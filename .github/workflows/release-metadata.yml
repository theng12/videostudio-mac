name: Release metadata

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  release-metadata:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Require version bump and What's New entry
        env:
          BASE_REF: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
        run: |
          if [[ -z "$BASE_REF" || "$BASE_REF" =~ ^0+$ ]]; then
            BASE_REF="HEAD^"
          fi
          python scripts/check_release.py --base "$BASE_REF"
